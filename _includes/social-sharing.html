<p class="buttons">
  <a href="https://twitter.com/intent/tweet?text={{ page.title }}&amp;url={{ site.github.url }}{{ page.url }}"
    target="_blank">
    <button class="button is-primary is-inverted">
      <span class="icon is-small">
        <i class="fab fa-2x fa-twitter-square"></i>
      </span>
    </button>
  </a>
  <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.github.url }}{{ page.url }}&amp;title={{ page.title }}"
    target="_blank">
    <button class="button is-primary is-inverted">
      <span class="icon is-small">
        <i class="fab fa-facebook-square fa-2x" aria-hidden="true"></i>
      </span>
    </button>
  </a>
  <a href="https://plus.google.com/share?url={{ site.github.url }}{{ page.url }}" target="_blank">
  <button class="button is-primary is-inverted">
    <span class="icon is-small">
      <i class="fab fa-google-plus-square fa-2x" aria-hidden="true"></i>
    </span>
  </button>
  </a>
</p>
